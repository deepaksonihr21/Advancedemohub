<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEEPAKWEBCRAFTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000; 
            --bg: #050505;
            --card-bg: #0c0c0c;
        }

        /* --- 🔥 RESPONSIVE TRACKER (Phone + Laptop) --- */
        .page-tracker {
            position: fixed;
            z-index: 1000;
            background: rgba(20, 0, 0, 0.6); 
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            border: 1px solid rgba(255,0,0,0.2);
            transition: 0.3s ease;
        }

        @media (max-width: 768px) {
            .page-tracker {
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 50px;
                flex-direction: row;
            }
            .tracker-text { font-size: 0.6rem; letter-spacing: 1px; margin-bottom: 0; writing-mode: horizontal-tb; }
        }

        @media (min-width: 769px) {
            .page-tracker {
                right: 30px;
                top: 50%;
                transform: translateY(-50%);
                flex-direction: column;
                border-radius: 30px;
            }
            .tracker-text { 
                writing-mode: vertical-rl; 
                font-size: 0.65rem; 
                margin-bottom: 10px; 
            }
        }

        .tracker-text { 
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; 
            color: var(--primary); 
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
        .dot { width: 4px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--primary); box-shadow: 0 0 15px var(--primary); }
        @media (max-width: 768px) { .dot.active { width: 15px; height: 4px; border-radius: 10px; } }
        @media (min-width: 769px) { .dot.active { height: 25px; width: 4px; border-radius: 10px; } }

        /* --- Original Styles (Bilkul Same) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #110000, #050505);
            scroll-behavior: smooth;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 7vw, 4rem);
            margin-top: 50px;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-align: center;
            background: linear-gradient(to right, #fff 20%, #ff0000 50%, #fff 80%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
            padding: 0 10px;
            width: 100%;
        }

        /* --- 📱 Phone Fix for Name --- */
        @media (max-width: 600px) {
            h1 {
                letter-spacing: 2px;
                font-size: 1.8rem;
            }
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .sub-text {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            color: #888;
            margin-top: 15px;
            max-width: 600px;
            text-align: center;
            letter-spacing: 1px;
            padding: 0 20px;
        }

        .reels-container {
            width: 90%;
            max-width: 400px;
            margin-top: 50px;
        }

        .reel-card {
            position: relative;
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 9 / 16; /* Ratio 9:16 maintain rakha hai */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reel-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            transform: scale(1.02);
        }

        /* --- 🔥 Image Styling (Crop Logic) --- */
        .reel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 9:16 container ko fill karegi */
            object-position: top; /* Niche se crop karegi, top fixed rahega */
            filter: brightness(0.8);
            transition: 0.5s;
            display: block;
        }

        .reel-card:hover img { filter: brightness(1); }

        .cta-btn {
            margin-top: 30px;
            padding: 20px 40px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .cta-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: #fff;
            color: #000;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.3);
        }

        .view-next-wrapper {
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .view-next-btn {
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #fff;
            text-decoration: none;
            padding: 10px 30px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.4s;
        }

        .view-next-btn:hover {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            border-color: var(--primary);
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--primary), transparent);
            position: relative;
            overflow: hidden;
        }

        .scroll-line::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            animation: scrollMove 1.5s infinite;
        }

        @keyframes scrollMove {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        footer {
            margin-top: 40px;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 4px;
            font-size: 0.7rem;
            color: #333;
            border-top: 1px solid #111;
            width: 80%;
            padding-top: 30px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body>

    <div class="page-tracker">
        <span class="tracker-text">2 OF 4</span>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <h1>DEEPAKSONI</h1>

    <p class="sub-text">Turn your content into a premium brand that attracts clients.</p>

    <div class="reels-container">
        <div class="reel-card">
            <img src="p1.jpeg" alt="Deepak Soni Premium Branding">
        </div>
    </div>

    <a href="https://www.instagram.com/deepakwebcrafts" class="cta-btn">Get Your Premium Website 🚀</a>
    
    <p style="color:#ff0000; font-size:0.75rem; margin-top:10px; letter-spacing:1px; font-weight: 700;">
        Limited slots available this week
    </p>

    <div class="view-next-wrapper">
        <a href="https://deepaksonihr21.github.io/Advancedemohub/d3/" class="view-next-btn">Explore Next Page</a>
        <div class="scroll-line"></div>
    </div>

    <p style="color:#666; font-size:0.8rem; margin-top:20px;">
        Trusted by creators • Built for conversions
    </p>

    <footer>
        MMXXVI • DEEPAKWEBCRAFTS
    </footer>

</body>
</html>
