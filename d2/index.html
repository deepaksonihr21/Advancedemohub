<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepakSoniHR21 | Portfolio Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000; 
            --bg: #050505;
            --card-bg: #0c0c0c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #110000, #050505);
        }

        /* --- Main Branding --- */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            margin-top: 50px;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-align: center;
            /* Fixed Webkit Warning Here */
            background: linear-gradient(to right, #fff 20%, #ff0000 50%, #fff 80%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- Sub-text --- */
        .sub-text {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            color: #888;
            margin-top: 15px;
            max-width: 600px;
            text-align: center;
            letter-spacing: 1px;
            padding: 0 20px;
        }

        /* --- Single Premium Reel Container --- */
        .reels-container {
            width: 90%;
            max-width: 400px;
            margin-top: 50px;
            padding-bottom: 40px;
        }

        .reel-card {
            position: relative;
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 9 / 16;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reel-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            transform: scale(1.02);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
            transition: 0.5s;
        }

        .reel-card:hover video {
            filter: brightness(1);
        }

        /* --- Premium CTA --- */
        .cta-btn {
            margin-top: 30px;
            padding: 20px 40px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .cta-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: #fff;
            color: #000;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.3);
        }

        /* --- Footer --- */
        footer {
            margin-top: auto;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 4px;
            font-size: 0.7rem;
            color: #333;
            border-top: 1px solid #111;
            width: 80%;
            padding-top: 30px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }

    </style>
</head>
<body>

    <h1>DEEPAKSONIHR21</h1>

    <p class="sub-text">Turn your content into a premium brand that attracts clients.</p>

    <div class="reels-container">
        <div class="reel-card">
            <video autoplay muted loop playsinline>
                <source src="v1.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <a href="https://www.instagram.com/deepaksonihr21" class="cta-btn">Get Your Premium Website 🚀</a>
    
    <p style="color:#ff0000; font-size:0.75rem; margin-top:10px; letter-spacing:1px; font-weight: 700;">
        Limited slots available this week
    </p>

    <p style="color:#666; font-size:0.8rem; margin-top:20px;">
        Trusted by creators • Built for conversions
    </p>

    <footer>
        MMXXVI • ARCHITECTED BY DEEPAKSONIHR21
    </footer>

</body>
</html>
